<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Игры</title>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>

<h1>Игры</h1>
<div id="games"></div>

<script>
vkBridge.send('VKWebAppInit');

const API = "https://vk-games-backend-production.up.railway.app";

async function loadGames() {
  const res = await fetch(API + "/games");
  const games = await res.json();

  const container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach(g => {
    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${g.image}" width="200"/>
      <h3>${g.title}</h3>
      <p>${g.description}</p>
      <button onclick="register(${g.id})">Записаться</button>
      <hr/>
    `;

    container.appendChild(div);
  });
}

async function register(gameId) {
  const phone = prompt("Телефон:");
  const participants = prompt("Количество участников:");

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      game_id: gameId,
      phone,
      participants
    })
  });

  const data = await res.json();

  alert(
    "✅ Успешно!\n\n" +
    data.game.title + "\n" +
    phone + "\n" +
    participants
  );
}

loadGames();
</script>

</body>
</html>
